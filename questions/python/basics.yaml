- id: py-basics-001
  version: "1"
  topic: Python
  subtopic: Data Structures
  difficulty: beginner
  type: multiple_choice
  question: "Which of the following Python types are mutable? (Select all that apply)"
  options:
    - id: a
      text: "list"
      correct: true
    - id: b
      text: "tuple"
      correct: false
    - id: c
      text: "dict"
      correct: true
    - id: d
      text: "str"
      correct: false
  explanation: "Lists and dicts (and sets) are mutable — you can change their contents in place. Strings and tuples are immutable; any operation on them produces a new object."
  doc_url: "https://docs.python.org/3/library/stdtypes.html"
  tags: [mutable, immutable, types]

- id: py-basics-002
  version: "1"
  topic: Python
  subtopic: Functions
  difficulty: beginner
  type: single_choice
  question: "What does `*args` allow in a Python function definition?"
  options:
    - id: a
      text: "Passes keyword arguments as a dictionary"
      correct: false
    - id: b
      text: "Accepts any number of positional arguments as a tuple"
      correct: true
    - id: c
      text: "Unpacks a list before the function is called"
      correct: false
    - id: d
      text: "Makes all arguments optional"
      correct: false
  explanation: "`*args` collects all extra positional arguments into a tuple inside the function. `**kwargs` does the same for keyword arguments, collecting them into a dict."
  doc_url: "https://docs.python.org/3/tutorial/controlflow.html#arbitrary-argument-lists"
  tags: [functions, args, kwargs]

- id: py-basics-003
  version: "1"
  topic: Python
  subtopic: Identity
  difficulty: beginner
  type: single_choice
  question: "What is the difference between `is` and `==` in Python?"
  options:
    - id: a
      text: "`is` compares values; `==` compares identity"
      correct: false
    - id: b
      text: "`is` checks if two variables point to the same object in memory; `==` checks if their values are equal"
      correct: true
    - id: c
      text: "They are identical for all types"
      correct: false
    - id: d
      text: "`is` only works for numbers"
      correct: false
  explanation: "`is` tests object identity (same memory address). `==` tests value equality (calls `__eq__`). Use `is` only for singletons like `None`, `True`, `False`."
  doc_url: "https://docs.python.org/3/reference/expressions.html#is"
  tags: [identity, equality, operators]

- id: py-basics-004
  version: "1"
  topic: Python
  subtopic: List Comprehensions
  difficulty: beginner
  type: code_snippet
  question: "What does this list comprehension produce?"
  code: |
    result = [x ** 2 for x in range(5) if x % 2 == 0]
    print(result)
  options:
    - id: a
      text: "[0, 1, 4, 9, 16]"
      correct: false
    - id: b
      text: "[0, 4, 16]"
      correct: true
    - id: c
      text: "[1, 4, 9]"
      correct: false
    - id: d
      text: "[4, 16]"
      correct: false
  explanation: "range(5) gives 0,1,2,3,4. Filter for even (0,2,4), then square each: [0, 4, 16]."
  doc_url: "https://docs.python.org/3/tutorial/datastructures.html#list-comprehensions"
  tags: [list-comprehension, iteration]

- id: py-basics-005
  version: "1"
  topic: Python
  subtopic: Generators
  difficulty: intermediate
  type: single_choice
  question: "What makes a Python function a generator?"
  options:
    - id: a
      text: "Using the `@generator` decorator"
      correct: false
    - id: b
      text: "Returning a list from the function"
      correct: false
    - id: c
      text: "Using the `yield` keyword inside the function body"
      correct: true
    - id: d
      text: "Defining it with `async def`"
      correct: false
  explanation: "Any function containing `yield` becomes a generator function. Calling it returns a generator object; values are produced lazily one at a time, which is memory-efficient for large sequences."
  doc_url: "https://docs.python.org/3/glossary.html#term-generator"
  tags: [generators, yield, lazy-evaluation]

- id: py-basics-006
  version: "1"
  topic: Python
  subtopic: Decorators
  difficulty: intermediate
  type: code_snippet
  question: "What does this code print?"
  code: |
    def shout(func):
        def wrapper(*args, **kwargs):
            result = func(*args, **kwargs)
            return result.upper()
        return wrapper

    @shout
    def greet(name):
        return f"hello, {name}"

    print(greet("world"))
  options:
    - id: a
      text: "hello, world"
      correct: false
    - id: b
      text: "HELLO, WORLD"
      correct: true
    - id: c
      text: "Hello, World"
      correct: false
    - id: d
      text: "TypeError"
      correct: false
  explanation: "`@shout` wraps `greet` so calls go through `wrapper`, which calls the original and uppercases the result. `greet('world')` → `'hello, world'` → `'HELLO, WORLD'`."
  doc_url: "https://docs.python.org/3/glossary.html#term-decorator"
  tags: [decorators, closures, higher-order-functions]

- id: py-basics-007
  version: "1"
  topic: Python
  subtopic: Context Managers
  difficulty: intermediate
  type: single_choice
  question: "What is the purpose of a context manager (the `with` statement) in Python?"
  options:
    - id: a
      text: "To catch exceptions without a try/except block"
      correct: false
    - id: b
      text: "To guarantee setup and teardown code runs (e.g., closing a file), even if an exception occurs"
      correct: true
    - id: c
      text: "To create a new variable scope"
      correct: false
    - id: d
      text: "To run code asynchronously"
      correct: false
  explanation: "A context manager implements `__enter__` and `__exit__`. The `with` block calls `__enter__` on entry and `__exit__` on exit — even if an exception is raised — making resource cleanup reliable."
  doc_url: "https://docs.python.org/3/reference/compound_stmts.html#the-with-statement"
  tags: [context-manager, with, resource-management]

- id: py-basics-008
  version: "1"
  topic: Python
  subtopic: Slicing
  difficulty: beginner
  type: code_snippet
  question: "What does this slicing expression produce?"
  code: |
    s = [0, 1, 2, 3, 4, 5]
    print(s[1:5:2])
  options:
    - id: a
      text: "[1, 2, 3, 4]"
      correct: false
    - id: b
      text: "[1, 3]"
      correct: true
    - id: c
      text: "[0, 2, 4]"
      correct: false
    - id: d
      text: "[2, 4]"
      correct: false
  explanation: "`s[start:stop:step]` — start=1, stop=5 (exclusive), step=2. Indices visited: 1, 3 → values [1, 3]."
  doc_url: "https://docs.python.org/3/library/functions.html#slice"
  tags: [slicing, lists]

- id: py-basics-009
  version: "1"
  topic: Python
  subtopic: Dicts
  difficulty: intermediate
  type: multiple_choice
  question: "Which statements about Python dicts are true in Python 3.7+? (Select all that apply)"
  options:
    - id: a
      text: "Dicts preserve insertion order"
      correct: true
    - id: b
      text: "Dict keys must be hashable"
      correct: true
    - id: c
      text: "Dict values must be hashable"
      correct: false
    - id: d
      text: "dict.get(key) raises KeyError if the key is missing"
      correct: false
  explanation: "Since Python 3.7, dicts are ordered by insertion. Keys must be hashable (strings, numbers, tuples of hashables). Values can be anything. `dict.get(key)` returns None for missing keys; only `dict[key]` raises KeyError."
  doc_url: "https://docs.python.org/3/library/stdtypes.html#dict"
  tags: [dict, hashable, ordering]

- id: py-basics-010
  version: "1"
  topic: Python
  subtopic: GIL
  difficulty: intermediate
  type: single_choice
  question: "What is the GIL (Global Interpreter Lock) in CPython?"
  options:
    - id: a
      text: "A lock that prevents multiple threads from executing Python bytecode simultaneously"
      correct: true
    - id: b
      text: "A mechanism that speeds up multi-core computation"
      correct: false
    - id: c
      text: "A security feature that prevents untrusted code from running"
      correct: false
    - id: d
      text: "A garbage collection pause that freezes all threads"
      correct: false
  explanation: "The GIL is a mutex in CPython that allows only one thread to execute Python bytecode at a time. It simplifies memory management but limits CPU-bound parallelism. I/O-bound threads can still benefit from threading because the GIL is released during I/O waits."
  doc_url: "https://docs.python.org/3/glossary.html#term-global-interpreter-lock"
  tags: [GIL, concurrency, CPython]
