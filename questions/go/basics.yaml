- id: go-basics-001
  version: "1"
  topic: Go
  subtopic: Goroutines
  difficulty: beginner
  type: single_choice
  question: "What keyword starts a goroutine in Go?"
  options:
    - id: a
      text: "async func()"
      correct: false
    - id: b
      text: "go func()"
      correct: true
    - id: c
      text: "spawn func()"
      correct: false
    - id: d
      text: "thread func()"
      correct: false
  explanation: "The `go` keyword before a function call launches it as a goroutine — a lightweight thread managed by the Go runtime."
  doc_url: "https://go.dev/tour/concurrency/1"
  tags: [goroutines, concurrency]

- id: go-basics-002
  version: "1"
  topic: Go
  subtopic: Defer
  difficulty: beginner
  type: single_choice
  question: "What does `defer` do in Go?"
  options:
    - id: a
      text: "Runs the statement immediately in a new goroutine"
      correct: false
    - id: b
      text: "Delays the statement until the surrounding function returns"
      correct: true
    - id: c
      text: "Marks a function as non-blocking"
      correct: false
    - id: d
      text: "Skips the statement if an error occurred"
      correct: false
  explanation: "A deferred call is pushed onto a stack and executed (LIFO order) when the enclosing function returns, regardless of whether it returns normally or via panic."
  doc_url: "https://go.dev/tour/flowcontrol/12"
  tags: [defer, control-flow]

- id: go-basics-003
  version: "1"
  topic: Go
  subtopic: Error Handling
  difficulty: beginner
  type: single_choice
  question: "What is the idiomatic way to handle errors in Go?"
  options:
    - id: a
      text: "try/catch blocks"
      correct: false
    - id: b
      text: "Returning an error value and checking it with if err != nil"
      correct: true
    - id: c
      text: "Throwing exceptions with throw"
      correct: false
    - id: d
      text: "Using a global error variable"
      correct: false
  explanation: "Go uses explicit error values. Functions return (result, error), and callers check `if err != nil`. This makes error handling visible and intentional."
  doc_url: "https://go.dev/blog/error-handling-and-go"
  tags: [errors, idioms]

- id: go-basics-004
  version: "1"
  topic: Go
  subtopic: Zero Values
  difficulty: beginner
  type: multiple_choice
  question: "Which are correct zero values in Go? (Select all that apply)"
  options:
    - id: a
      text: "int → 0"
      correct: true
    - id: b
      text: "bool → false"
      correct: true
    - id: c
      text: "string → nil"
      correct: false
    - id: d
      text: "pointer → nil"
      correct: true
  explanation: "Zero values: numeric types → 0, bool → false, string → \"\" (empty string, not nil), pointers/slices/maps/channels/functions → nil."
  doc_url: "https://go.dev/tour/basics/12"
  tags: [zero-values, types]

- id: go-basics-005
  version: "1"
  topic: Go
  subtopic: Defer
  difficulty: intermediate
  type: code_snippet
  question: "What is the output of this program?"
  code: |
    package main

    import "fmt"

    func main() {
        for i := 0; i < 3; i++ {
            defer fmt.Println(i)
        }
    }
  options:
    - id: a
      text: "0 1 2"
      correct: false
    - id: b
      text: "2 1 0"
      correct: true
    - id: c
      text: "0 0 0"
      correct: false
    - id: d
      text: "Compile error"
      correct: false
  explanation: "Deferred calls are executed LIFO (last-in, first-out). The loop defers prints for 0, 1, 2 in that order, so they execute as 2, 1, 0. The value of i is captured at defer time."
  doc_url: "https://go.dev/blog/defer-panic-and-recover"
  tags: [defer, loops]

- id: go-basics-006
  version: "1"
  topic: Go
  subtopic: Interfaces
  difficulty: intermediate
  type: single_choice
  question: "How does a type satisfy an interface in Go?"
  options:
    - id: a
      text: "By explicitly declaring `implements InterfaceName`"
      correct: false
    - id: b
      text: "By implementing all the methods defined in the interface"
      correct: true
    - id: c
      text: "By embedding the interface in the struct definition"
      correct: false
    - id: d
      text: "By registering with the interface's package"
      correct: false
  explanation: "Go uses implicit (structural) interface satisfaction. If a type has all the methods an interface requires, it satisfies that interface — no explicit declaration needed."
