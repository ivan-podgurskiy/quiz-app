- id: go-basics-007
  version: "1"
  topic: Go
  subtopic: Slices
  difficulty: intermediate
  type: multiple_choice
  question: "Which statements about Go slices are true? (Select all that apply)"
  options:
    - id: a
      text: "A slice is a view into an underlying array"
      correct: true
    - id: b
      text: "Slices have a length and a capacity"
      correct: true
    - id: c
      text: "Two slices can share the same backing array"
      correct: true
    - id: d
      text: "Appending to a slice always allocates a new array"
      correct: false
  explanation: "Slices are (pointer, length, capacity) descriptors over an array. Two slices can share backing storage. append only allocates when capacity is exceeded."
  doc_url: "https://go.dev/blog/slices-intro"
  tags: [slices, memory]

- id: go-basics-008
  version: "1"
  topic: Go
  subtopic: Channels
  difficulty: intermediate
  type: code_snippet
  question: "What does this program print?"
  code: |
    package main

    import "fmt"

    func sum(s []int, c chan int) {
        total := 0
        for _, v := range s {
            total += v
        }
        c <- total
    }

    func main() {
        s := []int{1, 2, 3, 4}
        c := make(chan int)
        go sum(s[:2], c)
        go sum(s[2:], c)
        x, y := <-c, <-c
        fmt.Println(x + y)
    }
  options:
    - id: a
      text: "3"
      correct: false
    - id: b
      text: "7"
      correct: false
    - id: c
      text: "10"
      correct: true
    - id: d
      text: "Deadlock"
      correct: false
  explanation: "Two goroutines compute the sum of [1,2]=3 and [3,4]=7 concurrently, sending results on channel c. x and y receive those two values (in any order), and x+y = 10."
  doc_url: "https://go.dev/tour/concurrency/2"
  tags: [channels, goroutines]

- id: go-basics-009
  version: "1"
  topic: Go
  subtopic: make vs new
  difficulty: intermediate
  type: single_choice
  question: "What is the difference between `make` and `new` in Go?"
  options:
    - id: a
      text: "They are identical; use either interchangeably"
      correct: false
    - id: b
      text: "`new` allocates zeroed memory and returns a pointer; `make` initializes slices, maps, and channels and returns the value itself"
      correct: true
    - id: c
      text: "`make` returns a pointer; `new` returns a value"
      correct: false
    - id: d
      text: "`make` is for structs; `new` is for built-in types"
      correct: false
  explanation: "`new(T)` allocates zero-valued T and returns *T. `make(T, ...)` only works for slices, maps, and channels — it initializes their internal data structures and returns T (not *T)."
  doc_url: "https://go.dev/doc/effective_go#allocation_new"
  tags: [make, new, memory]

- id: go-basics-010
  version: "1"
  topic: Go
  subtopic: Closures
  difficulty: intermediate
  type: code_snippet
  question: "What does this program output?"
  code: |
    package main

    import "fmt"

    func adder() func(int) int {
        sum := 0
        return func(x int) int {
            sum += x
            return sum
        }
    }

    func main() {
        pos := adder()
        fmt.Println(pos(1))
        fmt.Println(pos(2))
        fmt.Println(pos(3))
    }
  options:
    - id: a
      text: "1 2 3"
      correct: false
    - id: b
      text: "1 3 6"
      correct: true
    - id: c
      text: "0 1 3"
      correct: false
    - id: d
      text: "1 2 6"
      correct: false
  explanation: "The returned closure captures `sum` by reference. Each call accumulates: pos(1)=1, pos(2)=1+2=3, pos(3)=3+3=6."
  doc_url: "https://go.dev/tour/moretypes/25"
  tags: [closures, functions]
